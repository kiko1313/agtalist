name = "agtalist"
compatibility_date = "2024-01-01"

# Cloudflare Pages project configuration
# This file is for reference - actual deployment uses Cloudflare Dashboard
# when connecting your GitHub repository.

[site]
bucket = ".next"

[build]
command = "npm run build"

[build.environment]
NODE_VERSION = "20"

# Custom headers for performance and security
[[headers]]
for = "/*"
[headers.values]
X-Frame-Options = "DENY"
X-Content-Type-Options = "nosniff"
Referrer-Policy = "strict-origin-when-cross-origin"
Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache static assets aggressively
[[headers]]
for = "/_next/static/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

# Cache images
[[headers]]
for = "/images/*"
[headers.values]
Cache-Control = "public, max-age=86400"

# Redirect www to apex domain (configured in Cloudflare Dashboard)
# Or use Cloudflare Page Rules for this.